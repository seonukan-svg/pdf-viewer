<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 교재 뷰어</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        /* [핵심 1] 모든 요소가 화면 너비(100%)를 절대 넘지 않도록 테두리 계산법을 통일합니다 */
        * { box-sizing: border-box; } 
        
        body, html { margin: 0; padding: 0; height: 100%; height: 100dvh; overflow: hidden; background-color: #333; font-family: sans-serif; }
        .app-layout { display: flex; flex-direction: column; height: 100%; width: 100%; }
        
        /* [핵심 2] justify-content: space-between 으로 버튼들을 양옆으로 고르게 퍼트리고 스크롤을 차단합니다 */
        .top-toolbar { 
            display: flex; 
            flex-wrap: nowrap; 
            justify-content: space-between; 
            align-items: center; 
            gap: 3px; 
            padding: 8px 4px; 
            width: 100%; 
            background: #ffffff; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            z-index: 10; 
            flex-shrink: 0; 
            overflow: hidden; 
        }
        
        .bottom-toolbar { display: flex; flex-wrap: nowrap; justify-content: center; align-items: center; gap: 15px; padding: 10px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); width: 100%; background: #ffffff; box-shadow: 0 -2px 5px rgba(0,0,0,0.2); z-index: 10; flex-shrink: 0; }
        
        .canvas-scroll-area { flex-grow: 1; overflow: auto; display: flex; justify-content: center; align-items: center; background-color: #e2e6ea; width: 100%; }
        
        .canvas-wrapper { position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3); background: white; margin: auto; }
        #pdf-canvas { display: block; }
        #draw-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; } 

        /* [핵심 3] 모바일 한 줄 핏팅을 위해 버튼 사이즈, 폰트, 자간을 초정밀하게 줄였습니다 */
        button { 
            padding: 6px 6px; 
            font-size: 12px; 
            letter-spacing: -0.5px; 
            cursor: pointer; 
            border-radius: 6px; 
            border: 1px solid #ccc; 
            background: #f8f9fa; 
            font-weight: bold; 
            transition: 0.2s;
            flex-shrink: 1; 
            white-space: nowrap; 
            min-width: 0;
        }
        button:active { background: #dcdde1; }
        
        select { 
            padding: 6px 2px; 
            font-size: 12px; 
            letter-spacing: -0.5px;
            border-radius: 6px; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            background: white; 
            cursor: pointer;
            flex-shrink: 1;
            min-width: 0;
            text-overflow: ellipsis;
        }
        
        .page-info { font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .page-info input { padding: 5px; border: 1px solid #ccc; border-radius: 4px; width: 40px; text-align: center; font-size: 14px;}
        
        .divider { width: 1px; height: 20px; background-color: #ccc; margin: 0 1px; flex-shrink: 0; }

        #toggle-draw { border: 2px solid #ccc; background: #ffeaa7; color: #333; }
        #capture-btn { background: #74b9ff; color: white; border: none; }
    </style>
</head>
<body>

<div class="app-layout">
    <div class="top-toolbar">
        <select id="subject-selector">
            <option value="hanja">한자</option>
            <option value="isu">이수</option>
            <option value="english">영어</option>
            <option value="science">과학</option>
        </select>
        
        <select id="stage-selector"></select>

        <div class="divider"></div>

        <button id="toggle-draw">판서 OFF</button>
        <button id="undo-draw">되돌리기</button>
        <button id="capture-btn">캡처</button>
    </div>

    <div class="canvas-scroll-area" id="scroll-area">
        <div class="canvas-wrapper">
            <canvas id="pdf-canvas"></canvas>
            <canvas id="draw-canvas"></canvas>
        </div>
    </div>

    <div class="bottom-toolbar">
        <button id="prev-page">◀ 이전</button>
        <div class="page-info">
            <input type="number" id="page-num" value="1"> / <span id="page-count">0</span>
        </div>
        <button id="next-page">다음 ▶</button>
    </div>
</div>

<script>
    const subjectData = {
        "hanja": [
            { name: "A 단계", url: "./hanja-a.pdf" },
            { name: "B 단계", url: "./hanja-b.pdf" },
            { name: "C 단계", url: "./hanja-c.pdf" },
            { name: "D1 단계", url: "./hanja-d1.pdf" },
            { name: "D2 단계", url: "./hanja-d2.pdf" },
            { name: "E1 단계", url: "./hanja-e1.pdf" },
            { name: "E2 단계", url: "./hanja-e2.pdf" },
            { name: "F1 단계", url: "./hanja-f1.pdf" },
            { name: "F2 단계", url: "./hanja-f2.pdf" }
        ],
        "isu": [ { name: "A 단계", url: "./isu-a.pdf" }, { name: "B 단계", url: "./isu-b.pdf" } ],
        "english": [ { name: "A 단계", url: "./english-a.pdf" }, { name: "B 단계", url: "./english-b.pdf" } ],
        "science": [ { name: "1단계", url: "./science-1.pdf" }, { name: "2단계", url: "./science-2.pdf" } ]
    };

    let pdfDoc = null, pageNum = 1;
    let currentScale = 1.0; 
    let initialFitDone = false; 

    const pdfCanvas = document.getElementById('pdf-canvas');
    const ctx = pdfCanvas.getContext('2d');
    const drawCanvas = document.getElementById('draw-canvas');
    const drawCtx = drawCanvas.getContext('2d');
    const scrollArea = document.getElementById('scroll-area');
    const subjectSelector = document.getElementById('subject-selector');
    const stageSelector = document.getElementById('stage-selector');
    
    let isDrawing = false;
    let drawMode = false;
    let undoStack = [];

    function saveState() { undoStack.push(drawCanvas.toDataURL()); }

    function updateStageList(subjectKey) {
        stageSelector.innerHTML = ''; 
        const stages = subjectData[subjectKey];
        stages.forEach(stage => {
            const option = document.createElement('option');
            option.value = stage.url;
            option.textContent = stage.name;
            stageSelector.appendChild(option);
        });
    }

    function loadPDF(pdfUrl) {
        pageNum = 1; 
        initialFitDone = false; 
        clearDrawing(); 
        
        pdfjsLib.getDocument(pdfUrl).promise.then(pdfDoc_ => {
            pdfDoc = pdfDoc_;
            document.getElementById('page-count').textContent = pdfDoc.numPages;
            renderPage(pageNum);
        }).catch(error => {
            alert(`"${pdfUrl}" 파일을 찾을 수 없습니다. 깃허브에 해당 PDF 파일을 업로드 해주세요!`);
        });
    }

    function renderPage(num) {
        pdfDoc.getPage(num).then(page => {
            const baseViewport = page.getViewport({ scale: 1 });
            
            if (!initialFitDone) {
                const availableWidth = scrollArea.clientWidth;
                const availableHeight = scrollArea.clientHeight;
                const scaleWidth = availableWidth / baseViewport.width;
                const scaleHeight = availableHeight / baseViewport.height;
                currentScale = Math.min(scaleWidth, scaleHeight) * 0.98; 
                initialFitDone = true; 
            }

            const viewport = page.getViewport({ scale: currentScale });
            const outputScale = window.devicePixelRatio || 1;

            pdfCanvas.width = Math.floor(viewport.width * outputScale);
            pdfCanvas.height = Math.floor(viewport.height * outputScale);
            drawCanvas.width = Math.floor(viewport.width * outputScale);
            drawCanvas.height = Math.floor(viewport.height * outputScale);

            pdfCanvas.style.width = Math.floor(viewport.width) + "px";
            pdfCanvas.style.height = Math.floor(viewport.height) + "px";
            drawCanvas.style.width = Math.floor(viewport.width) + "px";
            drawCanvas.style.height = Math.floor(viewport.height) + "px";

            const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;

            page.render({ canvasContext: ctx, transform: transform, viewport: viewport });
            drawCtx.scale(outputScale, outputScale);

            document.getElementById('page-num').value = num;
            undoStack = [];
        });
    }

    window.addEventListener('resize', () => { initialFitDone = false; if(pdfDoc) renderPage(pageNum); });

    updateStageList(subjectSelector.value); 
    loadPDF(stageSelector.value); 

    subjectSelector.addEventListener('change', (e) => { updateStageList(e.target.value); loadPDF(stageSelector.value); });
    stageSelector.addEventListener('change', (e) => { loadPDF(e.target.value); });
    document.getElementById('prev-page').addEventListener('click', () => { if (pageNum <= 1) return; pageNum--; renderPage(pageNum); clearDrawing(); });
    document.getElementById('next-page').addEventListener('click', () => { if (pageNum >= pdfDoc.numPages) return; pageNum++; renderPage(pageNum); clearDrawing(); });
    document.getElementById('page-num').addEventListener('change', (e) => {
        const requestedPage = parseInt(e.target.value);
        if(requestedPage >= 1 && requestedPage <= pdfDoc.numPages) { pageNum = requestedPage; renderPage(pageNum); clearDrawing(); }
    });
    
    const toggleBtn = document.getElementById('toggle-draw');
    toggleBtn.addEventListener('click', () => {
        drawMode = !drawMode;
        if(drawMode) {
            toggleBtn.style.background = '#ff7675';
            toggleBtn.style.color = '#fff';
            toggleBtn.style.borderColor = '#d63031';
            toggleBtn.innerHTML = '판서 ON';
            drawCanvas.style.pointerEvents = 'auto'; 
        } else {
            toggleBtn.style.background = '#ffeaa7';
            toggleBtn.style.color = '#333';
            toggleBtn.style.borderColor = '#ccc';
            toggleBtn.innerHTML = '판서 OFF';
            drawCanvas.style.pointerEvents = 'none'; 
        }
    });

    function clearDrawing() { 
        const outputScale = window.devicePixelRatio || 1;
        drawCtx.clearRect(0, 0, drawCanvas.width / outputScale, drawCanvas.height / outputScale); 
        undoStack = []; 
    }

    document.getElementById('undo-draw').addEventListener('click', () => {
        if (undoStack.length > 0) {
            undoStack.pop(); 
            const outputScale = window.devicePixelRatio || 1;
            drawCtx.clearRect(0, 0, drawCanvas.width / outputScale, drawCanvas.height / outputScale); 
            if (undoStack.length > 0) {
                let img = new Image();
                img.onload = () => { drawCtx.drawImage(img, 0, 0, drawCanvas.width / outputScale, drawCanvas.height / outputScale); };
                img.src = undoStack[undoStack.length - 1];
            }
        }
    });

    document.getElementById('capture-btn').addEventListener('click', () => {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = pdfCanvas.width;
        tempCanvas.height = pdfCanvas.height;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(pdfCanvas, 0, 0);
        tempCtx.drawImage(drawCanvas, 0, 0);

        const link = document.createElement('a');
        const currentSubject = subjectSelector.options[subjectSelector.selectedIndex].text;
        const currentStage = stageSelector.options[stageSelector.selectedIndex].text;
        
        link.download = `${currentSubject}_${currentStage}_${pageNum}페이지.png`;
        link.href = tempCanvas.toDataURL('image/png');
        link.click();
    });

    drawCanvas.addEventListener('mousedown', (e) => { if (!drawMode) return; isDrawing = true; drawCtx.beginPath(); drawCtx.moveTo(e.offsetX, e.offsetY); drawCtx.strokeStyle = 'red'; drawCtx.lineCap = 'round'; drawCtx.lineWidth = 4; });
    drawCanvas.addEventListener('mousemove', (e) => { if (isDrawing && drawMode) { drawCtx.lineTo(e.offsetX, e.offsetY); drawCtx.stroke(); } });
    drawCanvas.addEventListener('mouseup', () => { if(isDrawing) { isDrawing = false; saveState(); } });
    
    drawCanvas.addEventListener('touchstart', (e) => { 
        if (!drawMode) return; 
        isDrawing = true; 
        const touch = e.touches[0];
        const rect = drawCanvas.getBoundingClientRect();
        drawCtx.beginPath(); 
        drawCtx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top); 
        drawCtx.strokeStyle = 'red'; 
        drawCtx.lineCap = 'round';
        drawCtx.lineWidth = 4; 
        e.preventDefault(); 
    });
    drawCanvas.addEventListener('touchmove', (e) => { 
        if (isDrawing && drawMode) { 
            const touch = e.touches[0];
            const rect = drawCanvas.getBoundingClientRect();
            drawCtx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top); 
            drawCtx.stroke(); 
            e.preventDefault(); 
        } 
    });
    drawCanvas.addEventListener('touchend', (e) => { if(isDrawing) { isDrawing = false; saveState(); e.preventDefault(); } });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PDF뷰어</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; }
        .toolbar { padding: 12px; background: #eef2f3; text-align: center; border-bottom: 1px solid #dcdde1; }
        .toolbar select { padding: 5px 10px; font-size: 14px; margin-right: 15px; border-radius: 4px; border: 1px solid #ccc; }
        .toolbar button { padding: 6px 12px; margin: 0 2px; font-size: 14px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: white; }
        .toolbar button:hover { background: #f5f6fa; }
        
        .canvas-container { position: relative; display: flex; justify-content: center; margin-top: 20px; padding-bottom: 40px; }
        #pdf-canvas { border: 1px solid #ccc; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #draw-canvas { position: absolute; top: 0; cursor: crosshair; }
    </style>
</head>
<body>

    <div class="toolbar">
        <select id="pdf-selector">
            <option value="./pdfs/hanja-a.pdf">한자 A 단계</option>
            <option value="./pdfs/hanja-b.pdf">한자 B 단계</option>
            <option value="./pdfs/hanja-c.pdf">한자 C 단계</option>
            <option value="./pdfs/hanja-d1.pdf">한자 D1 단계</option>
            <option value="./pdfs/hanja-d2.pdf">한자 D2 단계</option>
            <option value="./pdfs/hanja-e1.pdf">한자 E1 단계</option>
            <option value="./pdfs/hanja-e2.pdf">한자 E2 단계</option>
            <option value="./pdfs/hanja-f1.pdf">한자 F1 단계</option>
            <option value="./pdfs/hanja-f2.pdf">한자 F2 단계</option>
        </select>

        <button id="prev-page">이전</button>
        <span>페이지: <input type="number" id="page-num" value="1" style="width: 45px; text-align: center;"> / <span id="page-count">0</span></span>
        <button id="next-page">다음</button>
        
        <span style="margin: 0 15px; color: #ccc;">|</span>
        
        <button id="zoom-out">축소</button>
        <button id="zoom-in">확대</button>
        
        <span style="margin: 0 15px; color: #ccc;">|</span>
        
        <button id="toggle-draw" style="background: #ffeaa7;">판서 켜기/끄기</button>
        <button id="clear-draw">지우기</button>
    </div>

    <div class="canvas-container">
        <canvas id="pdf-canvas"></canvas>
        <canvas id="draw-canvas"></canvas>
    </div>

    <script>
        let pdfDoc = null, pageNum = 1, scale = 1.3;
        const pdfCanvas = document.getElementById('pdf-canvas');
        const ctx = pdfCanvas.getContext('2d');
        const drawCanvas = document.getElementById('draw-canvas');
        const drawCtx = drawCanvas.getContext('2d');
        let isDrawing = false;
        let drawMode = false;

        // [핵심 변경] 선택한 PDF 파일을 인터넷에서 읽어오는 마법 상자(함수)입니다
        function loadPDF(pdfUrl) {
            pageNum = 1; // 교재가 바뀌면 1페이지로 리셋
            clearDrawing(); // 판서 지우기
            
            pdfjsLib.getDocument(pdfUrl).promise.then(pdfDoc_ => {
                pdfDoc = pdfDoc_;
                document.getElementById('page-count').textContent = pdfDoc.numPages;
                renderPage(pageNum);
            }).catch(error => {
                alert("PDF 파일을 찾을 수 없습니다. pdfs 폴더에 파일명이 정확히 들어있는지 확인해 주세요!");
            });
        }

        // 화면에 현재 페이지를 그려주는 함수
        function renderPage(num) {
            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale: scale });
                
                // PDF 크기에 맞춰 도화지 크기 조절
                pdfCanvas.height = viewport.height;
                pdfCanvas.width = viewport.width;
                
                // 판서 패드 크기도 PDF와 똑같이 맞춤
                drawCanvas.height = viewport.height;
                drawCanvas.width = viewport.width;

                page.render({ canvasContext: ctx, viewport: viewport });
                document.getElementById('page-num').value = num;
            });
        }

        // 처음 사이트가 열릴 때 첫 번째 항목(한자 A 단계)을 기본으로 보여줍니다
        const selector = document.getElementById('pdf-selector');
        loadPDF(selector.value);

        // [기능] 선택창을 바꿨을 때 새로운 PDF를 불러오도록 지시합니다
        selector.addEventListener('change', (e) => {
            loadPDF(e.target.value);
        });

        // 페이지 이동 및 확대/축소 버튼 설정
        document.getElementById('prev-page').addEventListener('click', () => { if (pageNum <= 1) return; pageNum--; renderPage(pageNum); clearDrawing(); });
        document.getElementById('next-page').addEventListener('click', () => { if (pageNum >= pdfDoc.numPages) return; pageNum++; renderPage(pageNum); clearDrawing(); });
        document.getElementById('page-num').addEventListener('change', (e) => {
            const requestedPage = parseInt(e.target.value);
            if(requestedPage >= 1 && requestedPage <= pdfDoc.numPages) { pageNum = requestedPage; renderPage(pageNum); clearDrawing(); }
        });
        document.getElementById('zoom-in').addEventListener('click', () => { scale += 0.2; renderPage(pageNum); });
        document.getElementById('zoom-out').addEventListener('click', () => { if(scale > 0.5) scale -= 0.2; renderPage(pageNum); });

        // 판서 기능 설정
        document.getElementById('toggle-draw').addEventListener('click', (e) => {
            drawMode = !drawMode;
            if(drawMode) {
                e.target.style.background = '#fdcb6e';
                drawCanvas.style.pointerEvents = 'auto';
            } else {
                e.target.style.background = '#ffeaa7';
                drawCanvas.style.pointerEvents = 'none';
            }
        });
        document.getElementById('clear-draw').addEventListener('click', clearDrawing);
        function clearDrawing() { drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height); }

        // 마우스로 선 그리기 구현
        drawCanvas.addEventListener('mousedown', (e) => { if (!drawMode) return; isDrawing = true; drawCtx.beginPath(); drawCtx.moveTo(e.offsetX, e.offsetY); drawCtx.strokeStyle = 'red'; drawCtx.lineWidth = 2; });
        drawCanvas.addEventListener('mousemove', (e) => { if (isDrawing && drawMode) { drawCtx.lineTo(e.offsetX, e.offsetY); drawCtx.stroke(); } });
        drawCanvas.addEventListener('mouseup', () => { isDrawing = false; });
    </script>
</body>
</html>

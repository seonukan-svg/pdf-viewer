<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF뷰어</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #fafafa; }
        
        /* 모바일에서 버튼들이 예쁘게 줄바꿈 되도록 디자인을 수정했습니다 */
        .toolbar { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; padding: 12px; background: #eef2f3; border-bottom: 1px solid #dcdde1; }
        .toolbar select { padding: 8px; font-size: 15px; border-radius: 4px; border: 1px solid #ccc; font-weight: bold; }
        .toolbar button { padding: 8px 12px; font-size: 14px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: white; }
        .toolbar button:hover { background: #f5f6fa; }
        
        .page-info { font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .page-info input { padding: 4px; border: 1px solid #ccc; border-radius: 4px; }
        
        .canvas-container { position: relative; display: flex; justify-content: center; margin-top: 15px; padding-bottom: 40px; }
        #pdf-canvas { border: 1px solid #ccc; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #draw-canvas { position: absolute; top: 0; cursor: crosshair; }
    </style>
</head>
<body>

    <div class="toolbar">
        <select id="pdf-selector">
            <option value="./hanja-a.pdf">한자 A 단계</option>
            <option value="./hanja-b.pdf">한자 B 단계</option>
            <option value="./hanja-c.pdf">한자 C 단계</option>
            <option value="./hanja-d1.pdf">한자 D1 단계</option>
            <option value="./hanja-d2.pdf">한자 D2 단계</option>
            <option value="./hanja-e1.pdf">한자 E1 단계</option>
            <option value="./hanja-e2.pdf">한자 E2 단계</option>
            <option value="./hanja-f1.pdf">한자 F1 단계</option>
            <option value="./hanja-f2.pdf">한자 F2 단계</option>
        </select>

        <button id="prev-page">이전</button>
        <div class="page-info">
            <input type="number" id="page-num" value="1" style="width: 40px; text-align: center;"> / <span id="page-count">0</span>
        </div>
        <button id="next-page">다음</button>
        
        <button id="zoom-out">축소</button>
        <button id="zoom-in">확대</button>
        
        <button id="toggle-draw" style="background: #ffeaa7;">판서 켜기/끄기</button>
        <button id="clear-draw">지우기</button>
    </div>

    <div class="canvas-container">
        <canvas id="pdf-canvas"></canvas>
        <canvas id="draw-canvas"></canvas>
    </div>

    <script>
        let pdfDoc = null, pageNum = 1;
        let currentScale = 1.0; 
        let initialFitDone = false; // [핵심 추가 2] 최초 화면 맞춤 여부를 기억하는 변수

        const pdfCanvas = document.getElementById('pdf-canvas');
        const ctx = pdfCanvas.getContext('2d');
        const drawCanvas = document.getElementById('draw-canvas');
        const drawCtx = drawCanvas.getContext('2d');
        let isDrawing = false;
        let drawMode = false;

        function loadPDF(pdfUrl) {
            pageNum = 1; 
            initialFitDone = false; // 다른 단계의 교재를 열면 다시 화면에 꽉 차게 맞추기 위해 초기화
            clearDrawing(); 
            
            pdfjsLib.getDocument(pdfUrl).promise.then(pdfDoc_ => {
                pdfDoc = pdfDoc_;
                document.getElementById('page-count').textContent = pdfDoc.numPages;
                renderPage(pageNum);
            }).catch(error => {
                alert("PDF 파일을 찾을 수 없습니다.");
            });
        }

        function renderPage(num) {
            pdfDoc.getPage(num).then(page => {
                // 원본 PDF 사이즈 확인
                const baseViewport = page.getViewport({ scale: 1 });
                
                // [핵심 추가 3] 처음 교재를 열었을 때, 모바일 화면 너비에 95% 비율로 꽉 차게 계산합니다.
                if (!initialFitDone) {
                    const screenWidth = window.innerWidth;
                    currentScale = (screenWidth / baseViewport.width) * 0.95; 
                    initialFitDone = true; 
                }

                // 계산된 크기로 화면에 렌더링
                const viewport = page.getViewport({ scale: currentScale });
                
                pdfCanvas.height = viewport.height;
                pdfCanvas.width = viewport.width;
                drawCanvas.height = viewport.height;
                drawCanvas.width = viewport.width;

                page.render({ canvasContext: ctx, viewport: viewport });
                document.getElementById('page-num').value = num;
            });
        }

        const selector = document.getElementById('pdf-selector');
        loadPDF(selector.value);

        selector.addEventListener('change', (e) => {
            loadPDF(e.target.value);
        });

        document.getElementById('prev-page').addEventListener('click', () => { if (pageNum <= 1) return; pageNum--; renderPage(pageNum); clearDrawing(); });
        document.getElementById('next-page').addEventListener('click', () => { if (pageNum >= pdfDoc.numPages) return; pageNum++; renderPage(pageNum); clearDrawing(); });
        document.getElementById('page-num').addEventListener('change', (e) => {
            const requestedPage = parseInt(e.target.value);
            if(requestedPage >= 1 && requestedPage <= pdfDoc.numPages) { pageNum = requestedPage; renderPage(pageNum); clearDrawing(); }
        });
        
        // 줌 버튼을 누르면 계산된 currentScale 값에서 커지고 작아집니다
        document.getElementById('zoom-in').addEventListener('click', () => { currentScale += 0.2; renderPage(pageNum); });
        document.getElementById('zoom-out').addEventListener('click', () => { if(currentScale > 0.5) currentScale -= 0.2; renderPage(pageNum); });

        // 터치 및 마우스 판서 기능 설정
        document.getElementById('toggle-draw').addEventListener('click', (e) => {
            drawMode = !drawMode;
            if(drawMode) {
                e.target.style.background = '#fdcb6e';
                drawCanvas.style.pointerEvents = 'auto';
            } else {
                e.target.style.background = '#ffeaa7';
                drawCanvas.style.pointerEvents = 'none';
            }
        });
        document.getElementById('clear-draw').addEventListener('click', clearDrawing);
        function clearDrawing() { drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height); }

        // 마우스(PC) 이벤트
        drawCanvas.addEventListener('mousedown', (e) => { if (!drawMode) return; isDrawing = true; drawCtx.beginPath(); drawCtx.moveTo(e.offsetX, e.offsetY); drawCtx.strokeStyle = 'red'; drawCtx.lineWidth = 3; });
        drawCanvas.addEventListener('mousemove', (e) => { if (isDrawing && drawMode) { drawCtx.lineTo(e.offsetX, e.offsetY); drawCtx.stroke(); } });
        drawCanvas.addEventListener('mouseup', () => { isDrawing = false; });
        
        // 터치(모바일 기기 펜/손가락) 이벤트 지원 추가
        drawCanvas.addEventListener('touchstart', (e) => { 
            if (!drawMode) return; 
            isDrawing = true; 
            const touch = e.touches[0];
            const rect = drawCanvas.getBoundingClientRect();
            drawCtx.beginPath(); 
            drawCtx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top); 
            drawCtx.strokeStyle = 'red'; 
            drawCtx.lineWidth = 3; 
            e.preventDefault(); // 스크롤 방지
        });
        drawCanvas.addEventListener('touchmove', (e) => { 
            if (isDrawing && drawMode) { 
                const touch = e.touches[0];
                const rect = drawCanvas.getBoundingClientRect();
                drawCtx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top); 
                drawCtx.stroke(); 
                e.preventDefault(); 
            } 
        });
        drawCanvas.addEventListener('touchend', () => { isDrawing = false; });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 한자 뷰어</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; height: 100dvh; overflow: hidden; background-color: #333; font-family: sans-serif; }
        .app-layout { display: flex; flex-direction: column; height: 100%; }
        
        .top-toolbar { display: flex; flex-wrap: nowrap; justify-content: space-evenly; align-items: center; gap: 4px; padding: 8px 4px; background: #ffffff; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; flex-shrink: 0; white-space: nowrap; overflow-x: auto; }
        
        .bottom-toolbar { display: flex; flex-wrap: nowrap; justify-content: center; align-items: center; gap: 6px; padding: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); background: #ffffff; box-shadow: 0 -2px 5px rgba(0,0,0,0.2); z-index: 10; flex-shrink: 0; white-space: nowrap; overflow-x: auto; }
        
        .canvas-scroll-area { flex-grow: 1; overflow: auto; display: flex; justify-content: center; align-items: center; background-color: #e2e6ea; }
        
        .canvas-wrapper { position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3); background: white; margin: auto; }
        #pdf-canvas { display: block; }
        #draw-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; } 

        button { padding: 6px 10px; font-size: 13px; cursor: pointer; border-radius: 6px; border: 1px solid #ccc; background: #f8f9fa; font-weight: bold; transition: 0.2s;}
        button:active { background: #dcdde1; }
        select { padding: 6px; font-size: 14px; border-radius: 6px; border: 1px solid #ccc; font-weight: bold; background: white;}
        .page-info { font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 4px; }
        .page-info input { padding: 4px; border: 1px solid #ccc; border-radius: 4px; width: 35px; text-align: center; font-size: 13px;}
        
        #toggle-draw { border: 2px solid #ccc; background: #ffeaa7; color: #333; }
        #capture-btn { background: #74b9ff; color: white; border: none; }
    </style>
</head>
<body>

<div class="app-layout">
    
    <div class="top-toolbar">
        <button id="toggle-draw">판서 OFF</button>
        <button id="undo-draw">되돌리기</button>
        <button id="capture-btn">캡처</button>
    </div>

    <div class="canvas-scroll-area" id="scroll-area">
        <div class="canvas-wrapper">
            <canvas id="pdf-canvas"></canvas>
            <canvas id="draw-canvas"></canvas>
        </div>
    </div>

    <div class="bottom-toolbar">
        <select id="pdf-selector">
            <option value="./hanja-a.pdf">한자 A</option>
            <option value="./hanja-b.pdf">한자 B</option>
            <option value="./hanja-c.pdf">한자 C</option>
            <option value="./hanja-d1.pdf">한자 D1</option>
            <option value="./hanja-d2.pdf">한자 D2</option>
            <option value="./hanja-e1.pdf">한자 E1</option>
            <option value="./hanja-e2.pdf">한자 E2</option>
            <option value="./hanja-f1.pdf">한자 F1</option>
            <option value="./hanja-f2.pdf">한자 F2</option>
        </select>
        <button id="prev-page">◀ 이전</button>
        <div class="page-info">
            <input type="number" id="page-num" value="1"> / <span id="page-count">0</span>
        </div>
        <button id="next-page">다음 ▶</button>
    </div>

</div>

<script>
    let pdfDoc = null, pageNum = 1;
    let currentScale = 1.0; 
    let initialFitDone = false; 

    const pdfCanvas = document.getElementById('pdf-canvas');
    const ctx = pdfCanvas.getContext('2d');
    const drawCanvas = document.getElementById('draw-canvas');
    const drawCtx = drawCanvas.getContext('2d');
    const scrollArea = document.getElementById('scroll-area');
    
    let isDrawing = false;
    let drawMode = false;
    let undoStack = [];

    function saveState() { undoStack.push(drawCanvas.toDataURL()); }

    function loadPDF(pdfUrl) {
        pageNum = 1; 
        initialFitDone = false; 
        clearDrawing(); 
        
        pdfjsLib.getDocument(pdfUrl).promise.then(pdfDoc_ => {
            pdfDoc = pdfDoc_;
            document.getElementById('page-count').textContent = pdfDoc.numPages;
            renderPage(pageNum);
        }).catch(error => {
            alert("PDF 파일을 찾을 수 없습니다.");
        });
    }

    function renderPage(num) {
        pdfDoc.getPage(num).then(page => {
            const baseViewport = page.getViewport({ scale: 1 });
            
            if (!initialFitDone) {
                const availableWidth = scrollArea.clientWidth;
                const availableHeight = scrollArea.clientHeight;
                
                const scaleWidth = availableWidth / baseViewport.width;
                const scaleHeight = availableHeight / baseViewport.height;
                currentScale = Math.min(scaleWidth, scaleHeight) * 0.98; 
                
                initialFitDone = true; 
            }

            const viewport = page.getViewport({ scale: currentScale });
            
            pdfCanvas.height = viewport.height;
            pdfCanvas.width = viewport.width;
            drawCanvas.height = viewport.height;
            drawCanvas.width = viewport.width;

            page.render({ canvasContext: ctx, viewport: viewport });
            document.getElementById('page-num').value = num;
            undoStack = [];
        });
    }

    window.addEventListener('resize', () => {
        initialFitDone = false;
        if(pdfDoc) renderPage(pageNum);
    });

    const selector = document.getElementById('pdf-selector');
    loadPDF(selector.value);

    selector.addEventListener('change', (e) => { loadPDF(e.target.value); });
    document.getElementById('prev-page').addEventListener('click', () => { if (pageNum <= 1) return; pageNum--; renderPage(pageNum); clearDrawing(); });
    document.getElementById('next-page').addEventListener('click', () => { if (pageNum >= pdfDoc.numPages) return; pageNum++; renderPage(pageNum); clearDrawing(); });
    document.getElementById('page-num').addEventListener('change', (e) => {
        const requestedPage = parseInt(e.target.value);
        if(requestedPage >= 1 && requestedPage <= pdfDoc.numPages) { pageNum = requestedPage; renderPage(pageNum); clearDrawing(); }
    });
    
    // 판서 ON/OFF
    const toggleBtn = document.getElementById('toggle-draw');
    toggleBtn.addEventListener('click', () => {
        drawMode = !drawMode;
        if(drawMode) {
            toggleBtn.style.background = '#ff7675';
            toggleBtn.style.color = '#fff';
            toggleBtn.style.borderColor = '#d63031';
            toggleBtn.innerHTML = '판서 ON';
            drawCanvas.style.pointerEvents = 'auto'; 
        } else {
            toggleBtn.style.background = '#ffeaa7';
            toggleBtn.style.color = '#333';
            toggleBtn.style.borderColor = '#ccc';
            toggleBtn.innerHTML = '판서 OFF';
            drawCanvas.style.pointerEvents = 'none'; 
        }
    });

    function clearDrawing() { drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height); undoStack = []; }

    // 되돌리기
    document.getElementById('undo-draw').addEventListener('click', () => {
        if (undoStack.length > 0) {
            undoStack.pop(); 
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height); 
            if (undoStack.length > 0) {
                let img = new Image();
                img.onload = () => { drawCtx.drawImage(img, 0, 0); };
                img.src = undoStack[undoStack.length - 1];
            }
        }
    });

    // 캡처 다운로드
    document.getElementById('capture-btn').addEventListener('click', () => {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = pdfCanvas.width;
        tempCanvas.height = pdfCanvas.height;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(pdfCanvas, 0, 0);
        tempCtx.drawImage(drawCanvas, 0, 0);

        const link = document.createElement('a');
        link.download = `교재_캡처.png`;
        link.href = tempCanvas.toDataURL('image/png');
        link.click();
    });

    // --- 그리기 이벤트 ---
    drawCanvas.addEventListener('mousedown', (e) => { if (!drawMode) return; isDrawing = true; drawCtx.beginPath(); drawCtx.moveTo(e.offsetX, e.offsetY); drawCtx.strokeStyle = 'red'; drawCtx.lineCap = 'round'; drawCtx.lineWidth = 4; });
    drawCanvas.addEventListener('mousemove', (e) => { if (isDrawing && drawMode) { drawCtx.lineTo(e.offsetX, e.offsetY); drawCtx.stroke(); } });
    drawCanvas.addEventListener('mouseup', () => { if(isDrawing) { isDrawing = false; saveState(); } });
    
    drawCanvas.addEventListener('touchstart', (e) => { 
        if (!drawMode) return; 
        isDrawing = true; 
        const touch = e.touches[0];
        const rect = drawCanvas.getBoundingClientRect();
        drawCtx.beginPath(); 
        drawCtx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top); 
        drawCtx.strokeStyle = 'red'; 
        drawCtx.lineCap = 'round';
        drawCtx.lineWidth = 4; 
        e.preventDefault(); 
    });
    drawCanvas.addEventListener('touchmove', (e) => { 
        if (isDrawing && drawMode) { 
            const touch = e.touches[0];
            const rect = drawCanvas.getBoundingClientRect();
            drawCtx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top); 
            drawCtx.stroke(); 
            e.preventDefault(); 
        } 
    });
    drawCanvas.addEventListener('touchend', (e) => { if(isDrawing) { isDrawing = false; saveState(); e.preventDefault(); } });
</script>
</body>
</html>
